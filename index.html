<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foyer</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
button, input, select, textarea { font-family: inherit; font-size: inherit; }

:root {
  --ff: 'Plus Jakarta Sans', sans-serif;
  --ink:   #0d0d0d;
  --ink-2: #444;
  --ink-3: #888;
  --ink-4: #bbb;
  --line:  #e4e4e4;
  --line-2:#f0f0f0;
  --paper: #f7f7f5;
  --white: #fff;
  --r: 6px;
  --sw: 200px;
}

body.u-paul   { --acc:#2040d0; --acc-bg:#eef1fc; --acc-ln:#c4cef8; }
body.u-alexia { --acc:#c0186e; --acc-bg:#fceef5; --acc-ln:#f4b8d4; }
body.u-duo    { --acc:#9b5c00; --acc-bg:#fdf4e7; --acc-ln:#f5d49a; }
body.s-neutral { --acc:#1a7a4a; --acc-bg:#eaf6f0; --acc-ln:#a8dfc4; }

html, body { height: 100%; }
body { font-family: var(--ff); font-size: 13.5px; line-height: 1.5; color: var(--ink); background: var(--paper); transition: background .25s; }

/* ── LOADING ── */
#loader { position:fixed; inset:0; background:rgba(255,255,255,.75); display:flex; align-items:center; justify-content:center; z-index:999; font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-3); }
#loader.hidden { display:none; }

/* ── APP ── */
.app { display:flex; flex-direction:column; height:100vh; }

/* ── TOPNAV ── */
.topnav { display:flex; align-items:center; gap:0; height:52px; background:var(--white); border-bottom:1px solid var(--line); padding:0 20px; flex-shrink:0; position:sticky; top:0; z-index:100; }
.logo { font-weight:800; font-size:16px; letter-spacing:-.03em; color:var(--ink); margin-right:28px; flex-shrink:0; }
.logo span { color:var(--acc); transition:color .25s; }

.sec-tabs { display:flex; gap:2px; margin-right:auto; }
.sec-tab { display:flex; align-items:center; gap:7px; height:34px; padding:0 13px; border:none; background:none; font-weight:600; font-size:12px; letter-spacing:.04em; text-transform:uppercase; color:var(--ink-3); border-radius:var(--r); cursor:pointer; transition:background .12s, color .12s; white-space:nowrap; }
.sec-tab:hover { background:var(--line-2); color:var(--ink); }
.sec-tab.active { background:var(--acc-bg); color:var(--acc); border:1px solid var(--acc-ln); }
.sec-dot { width:6px; height:6px; border-radius:50%; background:currentColor; flex-shrink:0; }

.person-sw { display:flex; gap:4px; padding-left:16px; border-left:1px solid var(--line); }
.pbtn { display:flex; align-items:center; gap:7px; height:30px; padding:0 11px; border:1px solid transparent; background:transparent; border-radius:4px; cursor:pointer; font-weight:600; font-size:11.5px; letter-spacing:.03em; color:var(--ink-3); transition:all .15s; }
.pbtn:hover { border-color:var(--line); color:var(--ink); background:var(--line-2); }
.pbtn.active { background:var(--acc); border-color:var(--acc); color:#fff; }
.pmark { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.pmark.paul   { background:#2040d0; }
.pmark.alexia { background:#c0186e; }
.pmark.duo    { background:#9b5c00; }

/* ── BODY ── */
.body-split { display:flex; flex:1; overflow:hidden; }

/* ── SIDEBAR ── */
.sidebar { width:var(--sw); flex-shrink:0; background:var(--white); border-right:1px solid var(--line); display:flex; flex-direction:column; overflow-y:auto; padding:18px 0; transition:background .25s; }
.sidebar.hidden { display:none; }
.sb-sec { padding:0 12px; margin-bottom:18px; }
.sb-ttl { font-weight:800; font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-4); padding:0 8px; margin-bottom:6px; }
.cat-row { position:relative; border-radius:var(--r); }
.cat-row:hover { background:rgba(0,0,0,.035); }
.cat-btn { display:flex; align-items:center; gap:0; width:100%; min-width:0; padding:8px 10px; border:none; background:transparent; border-radius:var(--r); cursor:pointer; text-align:left; font-size:13px; color:var(--ink-2); transition:color .1s, background .1s; }
.cat-btn:hover { color:var(--ink); }
.cat-btn.active { background:var(--acc-bg); color:var(--acc); font-weight:700; }
.cat-lbl { flex:1; }
.cat-bdg { font-size:10px; font-weight:800; background:var(--acc); color:#fff; border-radius:10px; padding:1px 6px; flex-shrink:0; display:none; }
.cat-bdg.show { display:block; }
.sb-addcat { padding:0 10px; }
.addcat-row { display:flex; gap:5px; align-items:center; }
.addcat-inp { flex:1; border:1px solid var(--line); border-radius:var(--r); padding:5px 8px; font-size:12px; color:var(--ink); background:var(--paper); outline:none; min-width:0; }
.addcat-inp:focus { border-color:var(--acc); }
.addcat-inp::placeholder { color:var(--ink-4); }
.addcat-btn { border:none; background:var(--acc); color:#fff; border-radius:var(--r); width:26px; height:26px; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:opacity .15s; }
.addcat-btn:hover { opacity:.8; }

/* ── MAIN ── */
.main { flex:1; overflow-y:auto; min-width:0; }

/* ── PAGE HEADER ── */
.ph { padding:22px 26px 0; display:flex; align-items:flex-end; justify-content:space-between; gap:12px; flex-wrap:wrap; }
.ph-title { font-weight:800; font-size:22px; letter-spacing:-.03em; }
.ph-title span { color:var(--acc); transition:color .25s; }
.ph-meta { display:flex; align-items:center; gap:8px; margin-top:3px; flex-wrap:wrap; }
.ph-sub { font-size:12px; color:var(--ink-3); }
.quick-search { width:min(280px,100%); border:1px solid var(--line); border-radius:var(--r); background:var(--white); color:var(--ink); padding:8px 11px; font-size:12.5px; outline:none; transition:border-color .15s, box-shadow .15s; }
.quick-search:focus { border-color:var(--acc); box-shadow:0 0 0 3px var(--acc-bg); }
.quick-search::placeholder { color:var(--ink-4); }
.prio-legend { display:flex; align-items:center; gap:10px; }
.leg { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--ink-3); font-weight:600; letter-spacing:.02em; }
.leg-dot { width:8px; height:8px; border-radius:2px; }
.leg-dot.high { background:#e53e3e; }
.leg-dot.mid  { background:#d97706; }
.leg-dot.low  { background:var(--ink-4); }

.prog-row { padding:12px 26px 0; display:flex; align-items:center; gap:12px; }
.prog-track { flex:1; height:3px; background:var(--line); border-radius:2px; overflow:hidden; }
.prog-fill { height:100%; background:var(--acc); border-radius:2px; transition:width .4s ease, background .25s; }
.prog-lbl { font-size:11px; color:var(--ink-3); font-weight:700; white-space:nowrap; }

/* ── TOOLBAR ── */
.toolbar { padding:11px 26px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; border-bottom:1px solid var(--line); background:var(--white); }
.fstrip { display:flex; border:1px solid var(--line); border-radius:var(--r); overflow:hidden; }
.fchip { padding:5px 13px; font-size:12px; font-weight:600; letter-spacing:.02em; border:none; background:transparent; color:var(--ink-3); cursor:pointer; transition:background .1s, color .1s; white-space:nowrap; }
.fchip+.fchip { border-left:1px solid var(--line); }
.fchip:hover { background:var(--line-2); color:var(--ink); }
.fchip.active { background:var(--acc); color:#fff; }
.sort-pick { border:1px solid var(--line); border-radius:var(--r); padding:5px 9px; font-size:12px; font-weight:600; color:var(--ink-2); background:var(--white); outline:none; cursor:pointer; }
.cat-del-btn { display:none; border:1px solid #fecaca; background:#fff; color:#dc2626; border-radius:4px; padding:2px 7px; font-size:10.5px; font-weight:800; letter-spacing:.03em; text-transform:uppercase; cursor:pointer; transition:background .12s, color .12s; }
.cat-del-btn.show { display:inline-flex; align-items:center; }
.cat-del-btn:hover { background:#fef2f2; color:#b91c1c; }

/* ── ADD FORM ── */
.add-zone { padding:14px 26px 0; }
.add-form { background:var(--white); border:1px solid var(--line); border-radius:var(--r); overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.04); transition:border-color .15s, box-shadow .15s; }
.add-form:focus-within { border-color:var(--acc); box-shadow:0 0 0 3px var(--acc-bg); }
.add-form.is-editing, .ideas-add.is-editing, .task-add.is-editing { border-color:var(--acc); box-shadow:0 0 0 3px var(--acc-bg); }
.add-main { display:flex; align-items:center; }
.add-main input { flex:1; border:none; outline:none; padding:12px 15px; font-size:14px; color:var(--ink); background:transparent; min-width:0; }
.add-main input::placeholder { color:var(--ink-4); }
.add-sub-btn { border:none; background:var(--acc); color:#fff; padding:0 18px; font-weight:700; font-size:11.5px; letter-spacing:.06em; text-transform:uppercase; cursor:pointer; align-self:stretch; border-left:1px solid var(--line); transition:opacity .15s, background .25s; white-space:nowrap; }
.add-sub-btn:hover { opacity:.85; }
.form-cancel { display:none; border:1px solid var(--line); background:var(--white); color:var(--ink-3); border-radius:4px; padding:6px 12px; font-weight:700; font-size:11.5px; letter-spacing:.06em; text-transform:uppercase; cursor:pointer; transition:background .12s, color .12s; white-space:nowrap; }
.form-cancel.show { display:inline-flex; align-items:center; }
.form-cancel:hover { background:var(--line-2); color:var(--ink); }
.add-sub { display:flex; align-items:center; gap:9px; padding:0 15px 10px; border-top:1px solid var(--line-2); flex-wrap:wrap; }
.add-sub input { border:none; outline:none; font-size:12px; color:var(--ink-2); background:transparent; padding:7px 0 0; min-width:60px; }
.add-sub input::placeholder { color:var(--ink-4); }
.add-vsep { width:1px; height:14px; background:var(--line); flex-shrink:0; margin-top:7px; }
.prio-pick { border:1px solid var(--line); border-radius:4px; padding:3px 7px; font-size:11.5px; font-weight:600; color:var(--ink-2); background:var(--paper); outline:none; cursor:pointer; margin-top:7px; flex-shrink:0; }

/* ── ITEM LIST ── */
.items-wrap { padding:12px 26px 40px; }
.items-list { display:flex; flex-direction:column; gap:6px; }
.item { display:flex; align-items:flex-start; gap:11px; padding:13px 14px; background:var(--white); border:1px solid var(--line); border-radius:var(--r); transition:border-color .12s, box-shadow .12s; animation:sli .15s ease; }
@keyframes sli { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.item:hover { border-color:#d8d8d8; box-shadow:0 2px 8px rgba(0,0,0,.04); }
.item.done { background:var(--line-2); }
.item.done .item-name { text-decoration:line-through; color:var(--ink-4); }
.chk { width:18px; height:18px; flex-shrink:0; margin-top:2px; border:1.5px solid var(--ink-4); border-radius:4px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; background:transparent; }
.chk:hover { border-color:var(--acc); }
.item.done .chk { background:var(--acc); border-color:var(--acc); }
.chk svg { display:none; }
.item.done .chk svg { display:block; }
.pbar { width:3px; border-radius:2px; flex-shrink:0; align-self:stretch; min-height:18px; }
.pbar.high { background:#e53e3e; }
.pbar.mid  { background:#d97706; }
.pbar.low  { background:var(--line); }
.item-body { flex:1; min-width:0; }
.item-name { font-size:14px; font-weight:650; color:var(--ink); line-height:1.35; word-break:break-word; }
.item-note { font-size:12px; color:var(--ink-3); margin-top:2px; }
.item-meta { display:flex; align-items:center; gap:7px; margin-top:6px; flex-wrap:wrap; }
.item-tag { font-size:10.5px; padding:1px 7px; border-radius:3px; background:var(--acc-bg); color:var(--acc); border:1px solid var(--acc-ln); flex-shrink:0; font-weight:600; }
.item-price { font-size:10.5px; padding:1px 7px; border-radius:3px; background:var(--white); color:var(--ink-2); border:1px solid var(--line); flex-shrink:0; font-weight:700; }
.item-date { font-size:11px; color:var(--ink-4); flex-shrink:0; font-weight:600; }
.item-actions { display:flex; align-items:center; gap:5px; flex-shrink:0; margin-left:auto; }
.item-act { border:1px solid transparent; background:transparent; color:var(--ink-4); cursor:pointer; padding:4px 7px; border-radius:4px; transition:opacity .1s, background .1s, color .1s, border-color .1s; flex-shrink:0; }
.item-edit { display:flex; align-items:center; gap:4px; font-size:11px; font-weight:700; color:var(--ink-3); background:transparent; border-color:transparent; opacity:.45; }
.item:hover .item-edit, .item:focus-within .item-edit { opacity:1; color:var(--acc); background:var(--acc-bg); border-color:var(--acc-ln); }
.item-edit:hover { background:var(--acc-bg); color:var(--acc); }
.item-open { font-size:11px; font-weight:800; color:var(--acc); text-decoration:none; background:var(--white); border-color:var(--acc-ln); }
.item-open:hover { background:var(--acc-bg); }
.item-del { opacity:0; pointer-events:none; }
.item:hover .item-del, .item:focus-within .item-del { opacity:1; pointer-events:auto; }
.item-del:hover { background:#fef2f2; color:#e53e3e; }

/* ── IDEAS ── */
.ideas-wrap { padding:16px 26px 40px; }
.ideas-add { background:var(--white); border:1px solid var(--line); border-radius:var(--r); margin-bottom:18px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.04); transition:border-color .15s, box-shadow .15s; }
.ideas-add:focus-within { border-color:var(--acc); box-shadow:0 0 0 3px var(--acc-bg); }
.idea-ti { display:block; width:100%; border:none; outline:none; padding:12px 15px 5px; font-size:14px; font-weight:500; color:var(--ink); background:transparent; }
.idea-ti::placeholder { color:var(--ink-4); font-weight:400; }
.idea-bo { display:block; width:100%; border:none; outline:none; padding:2px 15px 10px; font-size:13px; color:var(--ink-2); background:transparent; resize:none; line-height:1.55; min-height:36px; font-family:var(--ff); }
.idea-bo::placeholder { color:var(--ink-4); }
.idea-ft { display:flex; align-items:center; gap:9px; padding:8px 12px; border-top:1px solid var(--line-2); flex-wrap:wrap; }
.idea-tag-inp { flex:1; border:none; outline:none; font-size:12px; color:var(--ink-2); background:transparent; min-width:80px; }
.idea-tag-inp::placeholder { color:var(--ink-4); }
.color-row { display:flex; gap:5px; flex-shrink:0; }
.cswatch { width:16px; height:16px; border-radius:3px; cursor:pointer; border:2px solid transparent; transition:transform .12s, border-color .12s; }
.cswatch:hover { transform:scale(1.15); }
.cswatch.sel { border-color:var(--ink); }
.ideas-grid { columns:3 220px; gap:12px; }
.idea-card { break-inside:avoid; margin-bottom:12px; border-radius:var(--r); padding:15px 16px; border:1px solid transparent; position:relative; transition:box-shadow .15s, transform .15s, border-color .15s; animation:sli .15s ease; cursor:default; }
.idea-card:hover { box-shadow:0 5px 18px rgba(0,0,0,.08); transform:translateY(-1px); }
.idea-card-ttl { font-size:14px; font-weight:800; color:var(--ink); margin-bottom:5px; line-height:1.35; padding-right:4px; }
.idea-card-body { font-size:12.5px; color:#444; line-height:1.55; white-space:pre-wrap; word-break:break-word; }
.idea-card-tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:9px; }
.idea-card-tag { font-size:10.5px; padding:1px 7px; border-radius:3px; background:rgba(0,0,0,.08); color:#444; font-weight:600; }
.idea-card-date { font-size:10.5px; color:rgba(0,0,0,.3); margin-top:7px; font-weight:600; }
.idea-card-actions { display:flex; justify-content:flex-end; gap:4px; margin:-5px 0 8px; opacity:.35; transition:opacity .1s; }
.idea-card:hover .idea-card-actions, .idea-card:focus-within .idea-card-actions { opacity:1; }
.idea-card-act { border:none; background:rgba(255,255,255,.5); color:#555; min-width:22px; height:22px; padding:0 6px; border-radius:4px; cursor:pointer; font-size:10.5px; font-weight:700; display:flex; align-items:center; justify-content:center; gap:4px; transition: background .1s, color .1s; }
.idea-card-edit:hover { background:rgba(0,0,0,.16); color:var(--acc); }
.idea-card-del:hover { background:rgba(220,0,0,.15); color:#c00; }
.ic-1 { background:#fffbeb; border-color:#fde68a; }
.ic-2 { background:#eff6ff; border-color:#bfdbfe; }
.ic-3 { background:#f0fdf4; border-color:#bbf7d0; }
.ic-4 { background:#fdf2f8; border-color:#f5d0e7; }
.ic-5 { background:#f5f3ff; border-color:#ddd6fe; }
.ic-6 { background:#fff7ed; border-color:#fed7aa; }
.ic-7 { background:#fff;    border-color:#e4e4e4; }

/* ── TASKS ── */
.tasks-wrap { padding:16px 26px 40px; }
.task-add { background:var(--white); border:1px solid var(--line); border-radius:var(--r); display:flex; flex-direction:column; margin-bottom:10px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.04); transition:border-color .15s, box-shadow .15s; }
.task-add:focus-within { border-color:var(--acc); box-shadow:0 0 0 3px var(--acc-bg); }
.task-add-row1 { display:flex; align-items:center; }
.task-add-row2 { display:flex; align-items:center; border-top:1px solid var(--line-2); background:var(--paper); flex-wrap:wrap; }
.task-add input[type="text"] { flex:1; border:none; outline:none; padding:13px 15px; font-size:14px; color:var(--ink); background:transparent; min-width:0; }
.task-add input[type="text"]::placeholder { color:var(--ink-4); }
.ta-sep { width:1px; height:20px; background:var(--line); flex-shrink:0; }
.task-add select { border:none; outline:none; padding:0 12px; font-size:12px; font-weight:600; color:var(--ink-2); background:transparent; cursor:pointer; height:38px; flex-shrink:0; border-right:1px solid var(--line-2); }
.task-add input[type="date"] { flex:0 0 auto; height:38px; padding:0 10px; font-size:12px; font-weight:600; color:var(--ink-2); border:none; border-right:1px solid var(--line-2); cursor:pointer; background:transparent; outline:none; }
.task-add-until { display:none; align-items:center; }
.task-add-until.show { display:flex; }
.task-add-until-lbl { font-size:11px; font-weight:700; color:var(--ink-3); padding:0 4px 0 10px; white-space:nowrap; }
.task-add button { border:none; background:var(--acc); color:#fff; padding:0 18px; font-weight:700; font-size:11.5px; letter-spacing:.06em; text-transform:uppercase; cursor:pointer; height:46px; white-space:nowrap; transition:opacity .15s, background .25s; flex-shrink:0; }
.task-add button:hover { opacity:.85; }
.task-add .form-cancel { border:none; background:transparent; color:var(--ink-3); padding:0 14px; font-weight:700; font-size:11.5px; cursor:pointer; height:46px; border-left:1px solid var(--line-2); transition:background .12s, color .12s; }
.task-tools { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
.task-filters { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.task-strip { display:flex; border:1px solid var(--line); border-radius:var(--r); overflow:hidden; background:var(--white); }
.task-chip { border:none; background:transparent; color:var(--ink-3); padding:6px 11px; font-size:11.5px; font-weight:700; letter-spacing:.02em; cursor:pointer; white-space:nowrap; transition:background .12s, color .12s; }
.task-chip+.task-chip { border-left:1px solid var(--line); }
.task-chip:hover { background:var(--line-2); color:var(--ink); }
.task-chip.active { background:var(--acc); color:#fff; }
.task-filter-select { border:1px solid var(--line); border-radius:var(--r); background:var(--white); color:var(--ink-2); padding:6px 9px; font-size:11.5px; font-weight:700; outline:none; cursor:pointer; }
.task-action { border:1px solid var(--acc-ln); background:var(--acc-bg); color:var(--acc); border-radius:var(--r); padding:6px 10px; font-size:11.5px; font-weight:800; letter-spacing:.02em; cursor:pointer; white-space:nowrap; transition:opacity .12s, background .12s; }
.task-action:hover { opacity:.82; }
.task-stats { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; margin-bottom:14px; }
.task-stat { background:var(--white); border:1px solid var(--line); border-radius:var(--r); padding:10px 12px; min-width:0; }
.task-stat-k { font-size:9.5px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-4); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.task-stat-v { margin-top:2px; font-size:19px; line-height:1; font-weight:800; letter-spacing:-.03em; color:var(--ink); }
.task-stat.warn .task-stat-v { color:#d97706; }
.task-stat.hot .task-stat-v { color:#dc2626; }
.task-overdue { display:none; margin-bottom:14px; background:#fff7ed; border:1px solid #fed7aa; border-radius:var(--r); overflow:hidden; }
.task-overdue.show { display:block; }
.task-overdue-head { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:9px 11px; border-bottom:1px solid #fed7aa; }
.task-overdue-title { font-size:11px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:#9a3412; }
.task-overdue-list { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:7px; padding:8px; }
.wk-prog-row { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.wk-prog-track { flex:1; height:3px; background:var(--line); border-radius:2px; overflow:hidden; }
.wk-prog-fill { height:100%; background:var(--acc); border-radius:2px; transition:width .4s ease, background .25s; }
.wk-prog-lbl { font-size:11px; color:var(--ink-3); font-weight:700; white-space:nowrap; }
.wk-head { display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
.wk-title { font-weight:800; font-size:14px; letter-spacing:-.02em; margin-right:auto; }
.wk-btn { border:1px solid var(--line); background:var(--white); color:var(--ink-2); border-radius:var(--r); padding:5px 12px; font-weight:700; font-size:11.5px; letter-spacing:.04em; cursor:pointer; transition:all .12s; }
.wk-btn:hover { background:var(--line-2); color:var(--ink); }
.wk-btn.today { background:var(--acc); border-color:var(--acc); color:#fff; }
.wk-btn.today:hover { opacity:.85; }
.day-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:9px; }
@media(max-width:960px){ .day-grid{grid-template-columns:repeat(4,1fr)} }
@media(max-width:560px){ .day-grid{grid-template-columns:1fr} }
.day-col { background:var(--white); border:1px solid var(--line); border-radius:var(--r); min-height:150px; display:flex; flex-direction:column; overflow:hidden; transition:background .25s, border-color .15s, box-shadow .15s; }
.day-col.is-today { border-color:var(--acc); box-shadow:0 0 0 2px var(--acc-bg); }
.day-hd { padding:9px 11px 7px; border-bottom:1px solid var(--line-2); display:flex; align-items:flex-start; justify-content:space-between; }
.day-wn { font-size:9.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-4); margin-bottom:2px; }
.day-num { font-weight:800; font-size:20px; letter-spacing:-.03em; color:var(--ink); line-height:1; }
.day-col.is-today .day-num { color:var(--acc); }
.day-cnt { font-size:10px; color:var(--ink-4); font-weight:700; }
.day-tasks { flex:1; padding:8px 8px 0; display:flex; flex-direction:column; gap:5px; }
.tc { display:flex; align-items:flex-start; gap:7px; padding:7px 8px; background:var(--paper); border-radius:4px; border:1px solid var(--line-2); animation:sli .12s ease; }
.tc:hover { border-color:var(--line); }
.tc.tdone { opacity:.45; }
.tc.tdone .tc-name { text-decoration:line-through; color:var(--ink-4); }
.tcb { width:14px; height:14px; border:1.5px solid var(--ink-4); border-radius:3px; flex-shrink:0; margin-top:1px; cursor:pointer; display:flex; align-items:center; justify-content:center; background:transparent; transition:all .12s; }
.tcb:hover { border-color:var(--acc); }
.tc.tdone .tcb { background:var(--acc); border-color:var(--acc); }
.tcb svg { display:none; }
.tc.tdone .tcb svg { display:block; }
.tc-body { flex:1; min-width:0; }
.tc-name { font-size:12px; color:var(--ink); line-height:1.35; word-break:break-word; }
.tc-who { font-size:10px; color:var(--ink-4); font-weight:600; margin-top:1px; }
.tc-date { font-size:10px; color:var(--ink-3); font-weight:700; margin-top:1px; }
.tc-repeat { display:inline-flex; align-items:center; width:max-content; margin-top:4px; padding:1px 6px; border-radius:3px; background:var(--acc-bg); color:var(--acc); border:1px solid var(--acc-ln); font-size:9.5px; font-weight:800; letter-spacing:.04em; text-transform:uppercase; }
.tc-actions { display:flex; align-items:center; gap:3px; flex-shrink:0; opacity:.3; transition:opacity .1s; }
.tc:hover .tc-actions, .tc:focus-within .tc-actions { opacity:1; }
.tc-act { border:none; background:none; color:var(--ink-4); cursor:pointer; font-size:10px; padding:1px 3px; border-radius:3px; transition:background .1s, color .1s; flex-shrink:0; }
.tc-edit { display:flex; align-items:center; gap:3px; color:var(--acc); background:var(--acc-bg); font-weight:700; }
.tc-edit:hover { color:var(--acc); }
.tc-move { color:var(--ink-2); background:var(--white); border:1px solid var(--line); font-weight:700; }
.tc-move:hover { background:var(--line-2); color:var(--ink); }
.tc-del:hover { color:#d00; }
.day-inp-row { padding:6px 8px 8px; }
.day-inp { width:100%; border:1px dashed var(--line); border-radius:4px; padding:5px 8px; font-size:12px; color:var(--ink); background:transparent; outline:none; font-family:var(--ff); transition:border-color .15s, background .15s; }
.day-inp:focus { border-color:var(--acc); border-style:solid; background:var(--white); }
.day-inp::placeholder { color:var(--ink-4); }

/* ── SECTION SWITCH ── */
.section { display:none; }
.section.active { display:block; }
#sec-plants.active { display:flex; flex-direction:column; }

/* ── EMPTY ── */
.empty { padding:52px 26px; text-align:center; }
.empty-line { width:40px; height:3px; background:var(--line); border-radius:2px; margin:0 auto 12px; }
.empty-txt { font-size:12px; color:var(--ink-4); font-weight:700; letter-spacing:.06em; text-transform:uppercase; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--line); border-radius:2px; }

/* ── RESPONSIVE ── */

  .quick-search { width:100%; }
  .item { flex-wrap:wrap; }
  .item-actions { width:100%; justify-content:flex-end; }
  .item-edit { opacity:1; color:var(--acc); background:var(--acc-bg); border-color:var(--acc-ln); }
  .idea-card-actions { opacity:1; }

  .task-add { display:flex; flex-direction:column; }

  .task-tools { display:flex; flex-direction:column; align-items:stretch; gap:8px; margin-bottom:12px; }

  .task-strip { width:100%; display:grid; grid-auto-flow:column; grid-auto-columns:1fr; }

  .task-stat-v { font-size:22px; margin-top:3px; }
  .task-overdue-head { align-items:stretch; flex-direction:column; }
  .task-overdue-list { grid-template-columns:1fr; }
  .wk-prog-row { gap:8px; margin-bottom:12px; }
  .wk-prog-lbl { font-size:11px; }
  .wk-head { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }

  .wk-btn { padding:10px 6px; font-size:11px; min-width:0; }

  .day-col { min-height:0; }

  .day-num { font-size:22px; }

  .tc-act { min-height:34px; padding:7px 8px; border:1px solid var(--line); background:var(--white); color:var(--ink-2); font-size:11px; font-weight:700; text-align:center; border-radius:5px; }
  .tc-edit { justify-content:center; }

.pl-main { flex:1; overflow-y:auto; min-width:0; display:flex; flex-direction:column; max-height:calc(100vh - 52px); }

.pl-global-card { background:var(--white); border:1px solid var(--line); border-radius:var(--r); overflow:hidden; }

      <!-- PLANTES -->

            <div class="pl-add-url" id="plAddUrlZone">
              <input type="url" id="plNewUrl" placeholder="Lien La Green Touch (optionnel)…">

<script>
/* ══════════════════════════════════════
   CONFIG & CONSTANTS
══════════════════════════════════════ */
const SB_URL = 'https://newyutpqxoxmequdmqdw.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ld3l1dHBxeG94bWVxdWRtcWR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MjQyNTYsImV4cCI6MjA5MzQwMDI1Nn0.HGNl1HgfFj69tCPYDsTrcwBwZ0v5gWID9w6JUmnqiEk';
const HDR = { 'apikey': SB_KEY, 'Authorization': 'Bearer '+SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

const PERSONS = [
  { id:'paul',   name:'Paul',          cls:'u-paul'   },
  { id:'alexia', name:'Alexia',        cls:'u-alexia' },
  { id:'duo',    name:'Paul & Alexia', cls:'u-duo'    },
];

const DEFAULT_CATS = {
  paul:   [{id:'all',name:'Tout',builtin:true},{id:'tech',name:'Tech',builtin:false},{id:'mode',name:'Mode',builtin:false},{id:'livres',name:'Livres',builtin:false},{id:'maison',name:'Maison',builtin:false},{id:'loisirs',name:'Loisirs',builtin:false},{id:'voyage',name:'Voyages',builtin:false}],
  alexia: [{id:'all',name:'Tout',builtin:true},{id:'tech',name:'Tech',builtin:false},{id:'mode',name:'Mode',builtin:false},{id:'livres',name:'Livres',builtin:false},{id:'maison',name:'Maison',builtin:false},{id:'loisirs',name:'Loisirs',builtin:false},{id:'voyage',name:'Voyages',builtin:false}],
  duo:    [{id:'all',name:'Tout',builtin:true},{id:'maison',name:'Maison',builtin:false},{id:'voyage',name:'Voyages',builtin:false},{id:'cuisine',name:'Cuisine',builtin:false},{id:'sorties',name:'Sorties',builtin:false},{id:'cadeaux',name:'Cadeaux',builtin:false}],
};

const CARD_COLORS = [
  {id:'ic-1',hex:'#fffbeb'},{id:'ic-2',hex:'#eff6ff'},{id:'ic-3',hex:'#f0fdf4'},
  {id:'ic-4',hex:'#fdf2f8'},{id:'ic-5',hex:'#f5f3ff'},{id:'ic-6',hex:'#fff7ed'},{id:'ic-7',hex:'#fff'},
];

const DAY_S  = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const MONTHS = ['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
const PRIO_O = {high:0,mid:1,low:2};
const WHO_L  = {paul:'Paul',alexia:'Alexia',duo:'Paul & Alexia','':-''};
const TASK_SERIES_KEY = 'fy_task_series_v1';

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let person   = localStorage.getItem('fy_person') || 'paul';
let section  = 'wishlist';
let cat      = 'all';
let filter   = 'all';
let color    = 'ic-1';
let wkOffset = 0;
let taskScope = 'week';
let taskStatus = 'all';
let taskWho = 'all';
let search   = '';
let editingWishId = null;
let editingIdeaId = null;
let editingTaskId = null;

// In-memory cache
let C = { wishes:null, cats:null, ideas:null, tasks:null };
const bust = k => k ? C[k]=null : (C={wishes:null,cats:null,ideas:null,tasks:null});

/* ══════════════════════════════════════
   SUPABASE HELPERS
══════════════════════════════════════ */
async function sbGet(table, qs='') {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/${table}?${qs}`, {headers:HDR});
    return r.ok ? r.json() : [];
  } catch { return []; }
}
async function sbPost(table, body) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/${table}`, {method:'POST',headers:HDR,body:JSON.stringify(body)});
    return r.ok ? r.json() : null;
  } catch { return null; }
}
async function sbPatch(table, id, body) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {method:'PATCH',headers:HDR,body:JSON.stringify(body)});
    return r.ok;
  } catch { return false; }
}
async function sbDel(table, id) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {method:'DELETE',headers:HDR});
    return r.ok;
  } catch { return false; }
}

/* ══════════════════════════════════════
   DATA ACCESSORS (cached)
══════════════════════════════════════ */
async function getWishes() {
  if (!C.wishes) C.wishes = await sbGet('wishes', `person=eq.${person}&order=ts.desc`);
  return C.wishes || [];
}
async function getCats() {
  if (!C.cats) {
    const custom = await sbGet('categories', `person=eq.${person}&order=created_at.asc`);
    const hidden=hiddenCats();
    const defs = JSON.parse(JSON.stringify(DEFAULT_CATS[person] || DEFAULT_CATS.paul))
      .filter(c=>c.id==='all'||!hidden.includes(c.id))
      .map(c=>({...c,custom:false}));
    C.cats = [...defs, ...(custom||[]).filter(c => !defs.find(d=>d.id===c.id)).map(c=>({...c,custom:true}))];
  }
  return C.cats || [];
}
async function getIdeas() {
  if (!C.ideas) C.ideas = await sbGet('ideas', `person=eq.${person}&order=created_at.desc`);
  return C.ideas || [];
}
async function getTasks() {
  if (!C.tasks) C.tasks = await sbGet('tasks', 'order=created_at.asc');
  return C.tasks || [];
}

/* ══════════════════════════════════════
   UTILS
══════════════════════════════════════ */
const fmt     = d => new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
const surl    = u => { try{return new URL(u).hostname.replace('www.','')}catch{return u} };
const esc     = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const todayK  = () => { const d=new Date(); d.setHours(0,0,0,0); return d.toISOString().slice(0,10); };
const dateKey = d => { const x=new Date(d); x.setHours(0,0,0,0); return x.toISOString().slice(0,10); };
const offsetDayK = n => { const d=new Date(); d.setDate(d.getDate()+n); return dateKey(d); };
const monday  = (off=0) => { const d=new Date(),day=d.getDay()||7; d.setDate(d.getDate()-day+1+off*7); d.setHours(0,0,0,0); return d; };
const matchSearch = (...parts) => !search || parts.join(' ').toLowerCase().includes(search);
const priceStore = () => JSON.parse(localStorage.getItem('fy_wish_prices')||'{}');
const savePriceLocal = (id,price) => { const prices=priceStore(); price ? prices[id]=price : delete prices[id]; localStorage.setItem('fy_wish_prices',JSON.stringify(prices)); };
const wishPrice = item => item.price || priceStore()[item.id] || '';
const hiddenCatKey = () => `fy_hidden_cats_${person}`;
const hiddenCats = () => JSON.parse(localStorage.getItem(hiddenCatKey())||'[]');
const hideDefaultCat = id => localStorage.setItem(hiddenCatKey(),JSON.stringify([...new Set([...hiddenCats(),id])]));
const svgChk  = `<svg width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5l2.5 2.5 4.5-5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const svgChkSm= `<svg width="8" height="6" viewBox="0 0 8 6" fill="none"><path d="M1 3l2 2 4-4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const svgEdit = `<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M6.9 1.8l2.3 2.3M1.5 9.5l2.2-.5 5.6-5.6-1.7-1.7L2 7.3l-.5 2.2z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const svgX    = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;
const loader  = show => document.getElementById('loader').classList.toggle('hidden', !show);

/* ══════════════════════════════════════
   THEME
══════════════════════════════════════ */
function applyTheme() {
  const cls = (PERSONS.find(p=>p.id===person)||{cls:'u-paul'}).cls;
  document.body.className = cls + (section !== 'wishlist' ? ' s-neutral' : '');
}

/* ══════════════════════════════════════
   PERSON SWITCHER
══════════════════════════════════════ */
function renderPersonSw() {
  const visible = section === 'wishlist';
  const sw = document.getElementById('personSw');
  sw.style.display = visible ? '' : 'none';
  sw.innerHTML = PERSONS.map(p =>
    `<button class="pbtn ${person===p.id?'active':''}" onclick="switchPerson('${p.id}')">
      <div class="pmark ${p.id}"></div>${esc(p.name)}
    </button>`).join('');
}

async function switchPerson(id) {
  cancelAllEdits();
  person=id; cat='all'; filter='all';
  localStorage.setItem('fy_person', id);
  bust();
  document.querySelectorAll('.fchip').forEach(b=>b.classList.toggle('active',b.dataset.f==='all'));
  applyTheme(); renderPersonSw();
  loader(true); await renderAll(); loader(false);
}

/* ══════════════════════════════════════
   SECTION
══════════════════════════════════════ */
async function setSection(el) {
  cancelAllEdits();
  section = el.dataset.s;
  document.querySelectorAll('.sec-tab').forEach(t=>t.classList.remove('active')); el.classList.add('active');
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+section).classList.add('active');
  const isWish = section==='wishlist';
  const isPlants = section==='plants';
  document.getElementById('sidebar').classList.toggle('hidden', !isWish);
  applyTheme();
  renderPersonSw();
  document.getElementById('prioLeg').style.display = isWish ? '' : 'none';
  document.getElementById('addCatZone').style.display = isWish ? '' : 'none';
  document.getElementById('phTitle').closest('.ph').style.display = isPlants ? 'none' : '';
  document.getElementById('progRow').style.display = isPlants ? 'none' : '';
  if(isPlants) { renderPlants(); return; }
  await renderAll();
}

/* ══════════════════════════════════════
   FILTER / CATEGORY / COLOR

async function setFilter(el) {
  document.querySelectorAll('.fchip').forEach(b=>b.classList.remove('active')); el.classList.add('active');
  filter=el.dataset.f; await renderWishlist(); await updateHeader();
}
async function setCat(id) {
  cat=id; await renderSidebar(); await renderWishlist(); await updateHeader();
}
function setColor(el,id) {
  color=id; document.querySelectorAll('.cswatch').forEach(c=>c.classList.remove('sel')); el.classList.add('sel');
}

async function setSearch(value) {
  search=value.trim().toLowerCase();
  if(section==='wishlist') await renderWishlist();
  if(section==='ideas') await renderIdeas();
  if(section==='tasks') await renderTasks();
}

function markEditing(formId, active) {
  const form=document.getElementById(formId);
  if(!form) return;
  form.classList.toggle('is-editing', active);
  if(active) form.scrollIntoView({behavior:'smooth',block:'center'});
}

function cancelAllEdits() {
  if(editingWishId) cancelWishEdit();
  if(editingIdeaId) cancelIdeaEdit();
  if(editingTaskId) cancelTaskEdit();
}

function updateCatDeleteButton(currentCat) {
  const btn=document.getElementById('catDelBtn');
  if(!btn) return;
  btn.classList.toggle('show', section==='wishlist' && !!currentCat && currentCat.id!=='all');
}

   SIDEBAR
══════════════════════════════════════ */
async function renderSidebar() {
  const cats=await getCats(), wishes=await getWishes();
  const el=document.getElementById('catList');
  el.innerHTML='<div class="sb-ttl">Catégories</div>'+cats.map(c=>{
    const n=c.id==='all'
      ? wishes.filter(i=>!i.done).length
      : wishes.filter(i=>(i.catId||i.cat_id)===c.id&&!i.done).length;
    return `<div class="cat-row">
      <button class="cat-btn ${cat===c.id?'active':''}" onclick="setCat('${c.id}')">
        <span class="cat-lbl">${esc(c.name)}</span>
        <span class="cat-bdg ${n?'show':''}">${n}</span>
      </button>
    </div>`;
  }).join('');
}

async function addCat() {
  const name=document.getElementById('catInp').value.trim(); if(!name) return;
  const id='c'+Date.now();
  await sbPost('categories',{id,person,name,builtin:false});
  bust('cats'); cat=id; document.getElementById('catInp').value='';
  await renderSidebar(); await renderWishlist(); await updateHeader();
}

async function delCurrentCat() {
  await delCat(cat);
}

async function delCat(id,e) {
  if(e) e.stopPropagation();
  const cats=await getCats();
  const current=cats.find(c=>c.id===id);
  if(!current || current.id==='all') return;
  if(!confirm('Supprimer cette catégorie ?')) return;
  const wishes=await getWishes();
  await Promise.all(wishes.filter(i=>(i.catId||i.cat_id)===id).map(i=>sbPatch('wishes',i.id,{cat_id:null})));
  if(current.custom) await sbDel('categories',id);
  else hideDefaultCat(id);
  bust(); if(cat===id) cat='all';
  await renderSidebar(); await renderWishlist(); await updateHeader();
}

document.getElementById('catInp').addEventListener('keydown',e=>{if(e.key==='Enter')addCat();});

/* ══════════════════════════════════════
   HEADER / PROGRESS
══════════════════════════════════════ */
async function updateHeader() {
  const p=PERSONS.find(x=>x.id===person);
  const titles={wishlist:'Wishlist',ideas:'Idées',tasks:'Tâches',plants:'Plantes'};
  let pv=0, pl='', sub='';
  let currentCat=null;

  if (section==='wishlist') {
    const [wishes,cats]=await Promise.all([getWishes(),getCats()]);
    const c=cats.find(x=>x.id===cat);
    currentCat=c;
    const scope=cat==='all'?wishes:wishes.filter(i=>(i.catId||i.cat_id)===cat);
    const done=scope.filter(i=>i.done).length;
    pv=scope.length?(done/scope.length)*100:0; pl=`${done} / ${scope.length}`;
    sub=`${p?.name} · ${c?.name||'Tout'}`;
    document.getElementById('progRow').style.display='';
  } else if (section==='ideas') {
    const ideas=await getIdeas();
    pv=0; pl=`${ideas.length} idée${ideas.length!==1?'s':''}`;
    sub=p?.name||''; document.getElementById('progRow').style.display='none';
  } else {
    const tasks=await getTasks();
    const m=monday(wkOffset);
    const days=Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(d.getDate()+i);return dateKey(d);});
    const wt=tasks.filter(t=>days.includes(t.day)); const done=wt.filter(t=>t.done).length;
    pv=wt.length?(done/wt.length)*100:0; pl=`${done} / ${wt.length} cette semaine`;
    sub='Emploi du temps partagé'; document.getElementById('progRow').style.display='';
  }

  document.getElementById('phTitle').firstChild.textContent=titles[section]+' ';
  document.getElementById('phSub').textContent=sub;
  document.getElementById('searchInp').placeholder=`Rechercher dans ${titles[section].toLowerCase()}…`;
  updateCatDeleteButton(currentCat);
  document.getElementById('progFill').style.width=pv+'%';
  document.getElementById('progLbl').textContent=pl;
}

async function addWish() {
  const name=document.getElementById('wName').value.trim(); if(!name){document.getElementById('wName').focus();return;}
  const ts=Date.now();
  const price=document.getElementById('wPrice').value.trim();
  const row={id:ts,person,name,url:document.getElementById('wUrl').value.trim()||null,note:document.getElementById('wNote').value.trim()||null,priority:document.getElementById('wPrio').value,cat_id:cat==='all'?null:cat,done:false,done_at:null,date:fmt(ts),ts};
  const saved=await sbPost('wishes',price?{...row,price}:row);
  if(!saved && price) await sbPost('wishes',row);
  if(price) savePriceLocal(ts,price);
  bust('wishes'); ['wName','wUrl','wNote','wPrice'].forEach(id=>document.getElementById(id).value='');
  await renderSidebar(); await renderWishlist(); await updateHeader();
  document.getElementById('wName').focus();
}

async function submitWish() {
  editingWishId ? await saveWishEdit() : await addWish();
}

}

async function editWish(id) {

  editingWishId=id;

  document.getElementById('wUrl').value=item.url||'';
  document.getElementById('wNote').value=item.note||'';
  document.getElementById('wPrice').value=wishPrice(item);

async function saveWishEdit() {
  const name=document.getElementById('wName').value.trim(); if(!name){document.getElementById('wName').focus();return;}
  const price=document.getElementById('wPrice').value.trim();
  const patch={
    name,
    url:document.getElementById('wUrl').value.trim()||null,
    note:document.getElementById('wNote').value.trim()||null,
    priority:document.getElementById('wPrio').value
  };
  const saved=await sbPatch('wishes',editingWishId,{...patch,price:price||null});
  if(!saved) await sbPatch('wishes',editingWishId,patch);
  savePriceLocal(editingWishId,price);
  cancelWishEdit(); bust('wishes');
  await renderSidebar(); await renderWishlist(); await updateHeader();
  document.getElementById('wName').focus();
}

async function toggleWish(id) {

  const done=!item.done; const done_at=done?fmt(Date.now()):null;
  await sbPatch('wishes',id,{done,done_at});
  bust('wishes'); await renderSidebar(); await renderWishlist(); await updateHeader();
}

  await sbDel('wishes',id); bust('wishes');

}

async function renderWishlist() {
  let items=await getWishes();
  if(cat!=='all') items=items.filter(i=>i.catId===cat||i.cat_id===cat);
  if(filter==='active') items=items.filter(i=>!i.done);
  if(filter==='done')   items=items.filter(i=>i.done);
  const sort=document.getElementById('sortPick').value;
  if(sort==='prio')  items.sort((a,b)=>(PRIO_O[a.priority]||1)-(PRIO_O[b.priority]||1));
  if(sort==='alpha') items.sort((a,b)=>a.name.localeCompare(b.name,'fr'));

  const cats=await getCats();
  const catName=id=>{const c=cats.find(c=>c.id===id);return c?.name||'';};
  if(search) items=items.filter(i=>matchSearch(i.name,i.note,i.url,wishPrice(i),catName(i.catId||i.cat_id)));
  const el=document.getElementById('wishList');

  if(!items.length){
    el.innerHTML=`<div class="empty"><div class="empty-line"></div><div class="empty-txt">${search?'Aucun résultat':filter==='done'?'Aucun souhait obtenu':filter==='active'?'Tout est obtenu':'Liste vide'}</div></div>`;
    return;
  }
  el.innerHTML=items.map(item=>`
    <div class="item ${item.done?'done':''}">
      <div class="chk" onclick="toggleWish(${item.id})">${svgChk}</div>
      <div class="pbar ${item.priority}"></div>
      <div class="item-body">
        <div class="item-name">${esc(item.name)}</div>
        ${item.note?`<div class="item-note">${esc(item.note)}</div>`:''}
        <div class="item-meta">
          ${wishPrice(item)?`<span class="item-price">${esc(wishPrice(item))}</span>`:''}
          ${cat==='all'&&(item.catId||item.cat_id)?`<span class="item-tag">${esc(catName(item.catId||item.cat_id))}</span>`:''}
          <span class="item-date">${item.done&&item.done_at?'Obtenu le '+item.done_at:item.date}</span>
        </div>
      </div>
      <div class="item-actions" onclick="event.stopPropagation()">
        ${item.url?`<a class="item-act item-open" href="${esc(item.url)}" target="_blank" rel="noopener">Ouvrir</a>`:''}
        <button class="item-act item-edit" title="Modifier" onclick="editWish(${item.id})">${svgEdit}<span>Modifier</span></button>
        <button class="item-act item-del" title="Supprimer" onclick="delWish(${item.id})">${svgX}</button>
      </div>
    </div>`).join('');
}

/* ══════════════════════════════════════
   TÂCHES
══════════════════════════════════════ */
function loadTaskSeries() {
  try { return JSON.parse(localStorage.getItem(TASK_SERIES_KEY)||'[]'); }
  catch { return []; }
}
function saveTaskSeries(series) {
  localStorage.setItem(TASK_SERIES_KEY, JSON.stringify(series));
}
function findTaskSeries(taskId) {
  const id=Number(taskId);
  return loadTaskSeries().find(s=>(s.taskIds||[]).map(Number).includes(id));
}
function taskDate(key) {
  const d=new Date(key+'T00:00:00');
  d.setHours(0,0,0,0);
  return d;
}
function addMonthsSafe(date, months) {
  const d=new Date(date);
  const day=d.getDate();
  d.setDate(1);
  d.setMonth(d.getMonth()+months);
  d.setDate(Math.min(day, new Date(d.getFullYear(), d.getMonth()+1, 0).getDate()));
  return d;
}
function seriesDates(rule, fromK, toK) {
  const out=[];
  const from=taskDate(fromK), to=taskDate(toK);
  let cur=taskDate(rule.start);
  let guard=0;
  while(cur<=to && guard<900) {
    if(cur>=from) out.push(dateKey(cur));
    if(rule.repeat==='daily') cur.setDate(cur.getDate()+1);
    else if(rule.repeat==='biweekly') cur.setDate(cur.getDate()+14);
    else if(rule.repeat==='weekly') cur.setDate(cur.getDate()+7);
    else if(rule.repeat==='monthly') cur=addMonthsSafe(cur,1);
    else if(rule.repeat==='annually') cur=addMonthsSafe(cur,12);
    else break;
    guard++;
  }
  return out.filter(k=>!rule.until || k<=rule.until);
}
async function createSeriesOccurrences(rule, fromK, toK, existingTasks=null) {
  const tasks=existingTasks || await getTasks();
  const known=new Set(tasks.map(t=>`${t.day}|${(t.name||'').toLowerCase()}|${t.who||''}`));
  const rows=seriesDates(rule, fromK, toK)
    .filter(day=>!known.has(`${day}|${(rule.name||'').toLowerCase()}|${rule.who||''}`))
    .map((day,i)=>({id:Date.now()+i,name:rule.name,day,who:rule.who||'',done:false}));
  for(const row of rows) await sbPost('tasks',row);
  if(rows.length) {
    const all=loadTaskSeries();
    const idx=all.findIndex(s=>s.id===rule.id);
    if(idx>=0) {
      all[idx].taskIds=[...new Set([...(all[idx].taskIds||[]), ...rows.map(r=>r.id)])];
      saveTaskSeries(all);
    }
    bust('tasks');
  }
  return rows.length;
}
async function ensureRecurringForWindow(fromK, toK, existingTasks=null) {
  const series=loadTaskSeries().filter(s=>!s.until || s.until>=fromK);
  for(const rule of series) await createSeriesOccurrences(rule, fromK, toK, existingTasks);
}
function repeatLabel(repeat) {
  return repeat==='daily'?'Quotidien':repeat==='biweekly'?'/ 2 sem.':repeat==='weekly'?'Hebdo':repeat==='monthly'?'Mensuel':repeat==='annually'?'Annuel':'Récurrent';
}

function fillDayDate(val) {
  const inp=document.getElementById('tqDay');
  inp.value = val || todayK();
}

function toggleUntil(repeat) {
  const wrap=document.getElementById('tqUntilWrap');
  wrap.classList.toggle('show', !!repeat);
  if(!repeat) document.getElementById('tqUntil').value='';

async function addTask() {
  const name=document.getElementById('tqName').value.trim(); if(!name){document.getElementById('tqName').focus();return;}
  const day=document.getElementById('tqDay').value;
  const who=document.getElementById('tqWho').value;
  const repeat=document.getElementById('tqRepeat').value;
  const until=document.getElementById('tqUntil').value;
  if(repeat) {
    const id='s'+Date.now();
    const horizon=until || offsetDayK(365);
    const rule={id,name,who,start:day,repeat,until:until||'',taskIds:[],createdAt:Date.now()};
    const all=loadTaskSeries();
    all.push(rule); saveTaskSeries(all);
    await createSeriesOccurrences(rule, day, horizon);
  } else {
    const row={id:Date.now(),name,day,who,done:false};
    await sbPost('tasks',row);
  }
  bust('tasks'); document.getElementById('tqName').value='';
  document.getElementById('tqRepeat').value='';
  document.getElementById('tqUntil').value='';
  toggleUntil('');
  fillDayDate();
  await renderTasks(); document.getElementById('tqName').focus();
}

async function delTask(id) {
  const series=findTaskSeries(id);
  if(series && confirm('Supprimer toute la tâche récurrente ?\n\nOK = toute la série\nAnnuler = seulement cette occurrence')) {
    await delTaskSeries(series.id);
    return;
  }
  if(!series && !confirm('Supprimer cette tâche ?')) return;
  await sbDel('tasks',id);
  if(series) {
    const all=loadTaskSeries();
    const idx=all.findIndex(s=>s.id===series.id);
    if(idx>=0) {
      all[idx].taskIds=(all[idx].taskIds||[]).filter(x=>Number(x)!==Number(id));
      saveTaskSeries(all);
    }
  }
  bust('tasks'); await renderTasks(); await updateHeader();
}

async function delTaskSeries(seriesId) {
  const all=loadTaskSeries();
  const series=all.find(s=>s.id===seriesId);
  if(!series) return;
  await Promise.all((series.taskIds||[]).map(id=>sbDel('tasks',id)));
  saveTaskSeries(all.filter(s=>s.id!==seriesId));
  bust('tasks'); await renderTasks(); await updateHeader();
}

  await sbPatch('tasks',id,{day:offsetDayK(1),done:false});
  bust('tasks'); await renderTasks(); await updateHeader();

async function moveLateTasksToToday() {
  const tasks=await getTasks();
  const today=todayK();
  const late=tasks.filter(t=>!t.done && t.day<today);
  if(!late.length) return;
  await Promise.all(late.map(t=>sbPatch('tasks',t.id,{day:today,done:false})));
  bust('tasks'); await renderTasks(); await updateHeader();
}

  taskScope=el.dataset.scope;

async function renderTasks() {
  fillDayDate();
  let tasks=await getTasks();
  const m=monday(wkOffset); const t=todayK();
  const days=Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(d.getDate()+i);return{key:dateKey(d),d:new Date(d),i};});
  await ensureRecurringForWindow(days[0].key, days[6].key, tasks);
  tasks=await getTasks();
  const seriesByTask=new Map();
  loadTaskSeries().forEach(s=>(s.taskIds||[]).forEach(id=>seriesByTask.set(Number(id),s)));
  const applyTaskFilters=list=>list
    .filter(x=>taskStatus==='all' || (taskStatus==='open'?!x.done:x.done))
    .filter(x=>taskWho==='all' || (x.who||'')===taskWho)
    .filter(x=>matchSearch(x.name,WHO_L[x.who]||'',seriesByTask.get(Number(x.id))?.repeat||''));

  const end=new Date(m); end.setDate(end.getDate()+6);
  document.getElementById('wkTitle').textContent=`${m.getDate()} ${MONTHS[m.getMonth()]} — ${end.getDate()} ${MONTHS[end.getMonth()]} ${end.getFullYear()}`;

  const wt=tasks.filter(x=>days.map(d=>d.key).includes(x.day));
  const wd=wt.filter(x=>x.done).length;
  document.getElementById('wkFill').style.width=wt.length?`${(wd/wt.length)*100}%`:'0%';
  document.getElementById('wkLbl').textContent=`${wd} / ${wt.length} tâche${wt.length!==1?'s':''}`;
  document.getElementById('taskStats').innerHTML=[
    ["Aujourd'hui",tasks.filter(x=>x.day===t&&!x.done).length,''],
    ['En retard',tasks.filter(x=>x.day<t&&!x.done).length,'hot'],
    ['Semaine',wt.filter(x=>!x.done).length,''],
    ['Terminées',wd,'']
  ].map(([k,v,cls])=>`<div class="task-stat ${cls}"><div class="task-stat-k">${k}</div><div class="task-stat-v">${v}</div></div>`).join('');

  const late=applyTaskFilters(tasks.filter(x=>x.day<t&&!x.done));
  document.getElementById('taskOverdue').classList.toggle('show', late.length>0 && taskScope!=='today');
  document.getElementById('taskOverdue').innerHTML=late.length?`
    <div class="task-overdue-head">
      <div class="task-overdue-title">${late.length} en retard</div>
      <button class="task-action" onclick="moveLateTasksToToday()">Ramener à aujourd'hui</button>
    </div>
    <div class="task-overdue-list">${late.map(x=>{
      const s=seriesByTask.get(Number(x.id));
      return `<div class="tc ${x.done?'tdone':''}">
        <div class="tcb" onclick="toggleTask(${x.id})">${svgChkSm}</div>
        <div class="tc-body">
          <div class="tc-name">${esc(x.name)}</div>
          <div class="tc-date">${fmt(x.day)}${x.who?` · ${WHO_L[x.who]||''}`:''}</div>
          ${s?`<div class="tc-repeat">${repeatLabel(s.repeat)}</div>`:''}
        </div>
        <div class="tc-actions" onclick="event.stopPropagation()">
          <button class="tc-act tc-move" title="Reporter à demain" onclick="moveTaskToTomorrow(${x.id})">Demain</button>
          <button class="tc-act tc-edit" title="Modifier" onclick="editTask(${x.id})">${svgEdit}<span>Modifier</span></button>
          ${s?`<button class="tc-act tc-move" title="Supprimer la série" onclick="delTaskSeries('${s.id}')">Série</button>`:''}
          <button class="tc-act tc-del" title="Supprimer" onclick="delTask(${x.id})">✕</button>
        </div>
      </div>`;
    }).join('')}</div>`:'';

  const visibleDays=taskScope==='today' ? days.filter(x=>x.key===t) : taskScope==='late' ? [] : days;
  document.getElementById('dayGrid').innerHTML=visibleDays.length?visibleDays.map(({key,d,i})=>{
    const dt=applyTaskFilters(tasks.filter(x=>x.day===key));
    const done=dt.filter(x=>x.done).length;
    return `<div class="day-col ${key===t?'is-today':''}">
      <div class="day-hd">
        <div><div class="day-wn">${DAY_S[i]}</div><div class="day-num">${d.getDate()}</div></div>
        ${dt.length?`<div class="day-cnt">${done}/${dt.length}</div>`:''}
      </div>
      <div class="day-tasks">
        ${dt.length?dt.map(x=>{
          const s=seriesByTask.get(Number(x.id));
          return `
          <div class="tc ${x.done?'tdone':''}">
            <div class="tcb" onclick="toggleTask(${x.id})">${svgChkSm}</div>
            <div class="tc-body">
              <div class="tc-name">${esc(x.name)}</div>
              ${x.who?`<div class="tc-who">${WHO_L[x.who]||''}</div>`:''}
              ${s?`<div class="tc-repeat">${repeatLabel(s.repeat)}</div>`:''}
            </div>
            <div class="tc-actions" onclick="event.stopPropagation()">
              ${!x.done && key<=t?`<button class="tc-act tc-move" title="Reporter à demain" onclick="moveTaskToTomorrow(${x.id})">Demain</button>`:''}
              <button class="tc-act tc-edit" title="Modifier" onclick="editTask(${x.id})">${svgEdit}<span>Modifier</span></button>
              ${s?`<button class="tc-act tc-move" title="Supprimer la série" onclick="delTaskSeries('${s.id}')">Série</button>`:''}
              <button class="tc-act tc-del" title="Supprimer" onclick="delTask(${x.id})">✕</button>
            </div>
          </div>`;
        }).join(''):`<div style="padding:6px 4px;font-size:11.5px;color:var(--ink-4);font-weight:600;">Rien</div>`}
      </div>
      <div class="day-inp-row">
        <input type="text" class="day-inp" id="di-${key}" placeholder="+ Ajouter…" maxlength="60"
          onkeydown="if(event.key==='Enter')addTaskDay('${key}')">
      </div>
    </div>`;
  }).join(''):`<div class="empty"><div class="empty-line"></div><div class="empty-txt">${late.length?'Retard affiché ci-dessus':'Aucun retard'}</div></div>`;

  await updateHeader();
}

const PL_KEY   = 'fy_plants_v1';
const PL_ENT_KEY = 'fy_plant_entries_v1';
const CARE_TYPES = [
  { id:'water',    label:'Arrosage',      icon:'💧' },
  { id:'mist',     label:'Humidification',icon:'🌫️' },
  { id:'repot',    label:'Rempotage',     icon:'🪴' },
  { id:'fertilize',label:'Engrais',       icon:'🌱' },
];
const SEASONS = [
  { id:'spring', label:'Printemps', icon:'🌸', months:[2,3,4] },
  { id:'summer', label:'Été',       icon:'☀️', months:[5,6,7] },
  { id:'autumn', label:'Automne',   icon:'🍂', months:[8,9,10] },
  { id:'winter', label:'Hiver',     icon:'❄️', months:[11,0,1] },
];
const FREQ_LABELS = {
  '1d':'Chaque jour','2d':'Tous les 2 jours','3d':'Tous les 3 jours',
  '1w':'Chaque semaine','2w':'Toutes les 2 semaines','1m':'Chaque mois',
  '3m':'Tous les 3 mois','6m':'Tous les 6 mois','1y':'Chaque année',
};

let plActivePlant = null; // 'global' | plant.id
let plActiveTab   = 'water';

function loadPlants() {
  try { return JSON.parse(localStorage.getItem(PL_KEY)||'[]'); } catch { return []; }
}
function savePlants(arr) { localStorage.setItem(PL_KEY, JSON.stringify(arr)); }
function loadEntries() {
  try { return JSON.parse(localStorage.getItem(PL_ENT_KEY)||'[]'); } catch { return []; }
}
function saveEntries(arr) { localStorage.setItem(PL_ENT_KEY, JSON.stringify(arr)); }

function currentSeason() {
  const m = new Date().getMonth();
  return SEASONS.find(s=>s.months.includes(m)) || SEASONS[0];
}

function freqToDays(freq) {
  if(!freq) return null;
  const n=parseInt(freq); const u=freq.slice(-1);
  if(u==='d') return n;
  if(u==='w') return n*7;
  if(u==='m') return n*30;
  if(u==='y') return n*365;
  return null;
}

function addDaysToKey(dateKey, days) {
  const d = new Date(dateKey+'T00:00:00');
  d.setDate(d.getDate()+days);
  return dateKey_(d);
}
function dateKey_(d) {
  return d.toISOString().slice(0,10);
}

function generateEntries(plant, careId, fromK, toK) {
  const care = (plant.cares||{})[careId]||{};
  if(!care.freq) return [];
  const days = freqToDays(care.freq);
  if(!days) return [];
  const entries = loadEntries().filter(e=>e.plantId===plant.id && e.careId===careId);
  const existing = new Set(entries.map(e=>e.date));
  const start = care.startDate || fromK;
  const out = [];
  let cur = new Date(start+'T00:00:00');
  const end = new Date(toK+'T00:00:00');
  let guard = 0;
  while(cur <= end && guard < 200) {
    const k = dateKey_(cur);
    if(k >= fromK && !existing.has(k)) out.push({ id:'pe'+Date.now()+Math.random().toString(36).slice(2), plantId:plant.id, careId, date:k, done:false, auto:true });
    cur.setDate(cur.getDate()+days);
    guard++;
  }
  return out;
}

function ensurePlantEntries(plant, careId) {
  if(!(plant.cares||{})[careId]?.freq) return;
  const today = todayK();
  const horizon = offsetDayK(90);
  const newEntries = generateEntries(plant, careId, today, horizon);
  if(newEntries.length) {
    const all = loadEntries();
    saveEntries([...all, ...newEntries]);
  }
}

  const isShowing = form.classList.toggle('show');
  if(isShowing) {
    setTimeout(()=>document.getElementById('plMobileName').focus(), 100);
  } else {
    document.getElementById('plMobileName').value='';
    document.getElementById('plMobileUrl').value='';
  }
}

function addPlantMobile() {
  const nameInp = document.getElementById('plMobileName');
  const name = nameInp.value.trim(); if(!name) { nameInp.focus(); return; }
  const gtUrl = document.getElementById('plMobileUrl').value.trim();
  const plants = loadPlants();
  const plant = { id:'pl'+Date.now(), name, emoji:'🌿', gtUrl: gtUrl||'', cares:{}, createdAt:Date.now() };
  plants.push(plant); savePlants(plants);

function nameToSlug(name) {
  return name.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'') // remove accents
    .replace(/[^a-z0-9\s-]/g,'')
    .trim().replace(/\s+/g,'-');
}

function addPlant() {
  const inp = document.getElementById('plNewName');
  const name = inp.value.trim(); if(!name) return;
  const urlInp = document.getElementById('plNewUrl');
  const gtUrl = urlInp ? urlInp.value.trim() : '';
  const plants = loadPlants();
  const plant = { id:'pl'+Date.now(), name, emoji:'🌿', gtUrl: gtUrl||'', cares:{}, createdAt:Date.now() };
  plants.push(plant); savePlants(plants);
  inp.value='';
  if(urlInp) urlInp.value='';
  plActivePlant = plant.id;
  plActiveTab = 'water';
  renderPlants();
}

function deletePlant(id) {
  if(!confirm('Supprimer cette plante et tout son historique ?')) return;
  const plants = loadPlants().filter(p=>p.id!==id);
  savePlants(plants);
  const entries = loadEntries().filter(e=>e.plantId!==id);
  saveEntries(entries);
  plActivePlant = plants.length ? (plants[0].id) : 'global';
  renderPlants();
}

function saveCareFreq(plantId, careId, freq, startDate) {
  const plants = loadPlants();
  const p = plants.find(x=>x.id===plantId); if(!p) return;
  if(!p.cares) p.cares={};
  p.cares[careId] = { freq, startDate: startDate||todayK() };
  savePlants(plants);
  // generate entries now
  ensurePlantEntries(p, careId);
  renderPlants();
}

function addManualEntry(plantId, careId, date, note) {
  if(!date) return;
  const entries = loadEntries();
  entries.push({ id:'pe'+Date.now(), plantId, careId, date, note:note||'', done:false, auto:false });
  saveEntries(entries);
  renderPlants();
}

function toggleEntry(id) {
  const entries = loadEntries();
  const e = entries.find(x=>x.id===id); if(!e) return;
  e.done = !e.done;
  saveEntries(entries);
  renderPlants();
}

function deleteEntry(id) {
  saveEntries(loadEntries().filter(e=>e.id!==id));
  renderPlants();
}

function renderPlants() {
  const plants = loadPlants();
  if(plActivePlant===null) plActivePlant = plants.length ? 'global' : null;

  // Ensure entries for all plants/cares
  plants.forEach(p => CARE_TYPES.forEach(c => ensurePlantEntries(p, c.id)));

  // Sidebar
  const sidebar = document.getElementById('plPlantList');
  sidebar.innerHTML =
    `<button class="pl-plant-btn ${plActivePlant==='global'?'active':''}" onclick="setPlantView('global')"><span class="pl-plant-icon">🏠</span><span class="pl-plant-lbl">Vue globale</span></button>` +
    plants.map(p=>`<button class="pl-plant-btn ${plActivePlant===p.id?'active':''}" onclick="setPlantView('${p.id}')"><span class="pl-plant-icon">${p.emoji||'🌿'}</span><span class="pl-plant-lbl">${esc(p.name)}</span></button>`).join('');

  // Main content
  const main = document.getElementById('plContent');
  if(!plActivePlant || plActivePlant==='global') {
    renderGlobalView(main, plants);
  } else {
    const plant = plants.find(p=>p.id===plActivePlant);
    if(plant) renderPlantView(main, plant);
    else { main.innerHTML=''; plActivePlant='global'; renderGlobalView(main, plants); }
  }
}

function setPlantView(id) {
  plActivePlant = id;
  if(id!=='global') plActiveTab='water';
  renderPlants();
}

function setPlantTab(tab) {
  plActiveTab = tab;
  renderPlants();
}

    html += `<div class="pl-content"><div class="pl-empty"><div class="pl-empty-txt">Ajoutez votre première plante dans la sidebar</div></div></div>`;

  }

  html += `<div class="pl-content">`;

    html += `<div class="pl-empty"><div class="pl-empty-txt">Rien à faire cette semaine 🎉</div></div>`;
  } else {
    html += `<div class="pl-global-grid">`;
    plants.forEach(p => {
      const pDue = due.filter(e=>e.plantId===p.id);
      if(!pDue.length) return;
      const overdue = pDue.filter(e=>e.date<today).length;
      html += `<div class="pl-global-card">

      const se = sEntries.filter(e=>e.seasonal===s.id);
      if(!se.length) return;
      html += `<div class="pl-section-title">${s.icon} ${s.label}</div>`;
      se.forEach(e=>{
        const isOd=e.date<today;
        html += `<div class="pl-entry ${e.done?'done':''} ${isOd&&!e.done?'overdue':''}">
          <div class="pl-echk" onclick="toggleEntry('${e.id}')">${svgChk}</div>
          <div class="pl-entry-body">
            <div class="pl-entry-label">${esc(e.note||'Tâche saisonnière')}</div>
            <div class="pl-entry-date">${fmt(e.date)}</div>
          </div>
          ${isOd&&!e.done?`<span class="pl-entry-badge overdue">Retard</span>`:''}
          <button class="pl-entry-del" onclick="deleteEntry('${e.id}')">✕</button>
        </div>`;
      });
    });
    if(!sEntries.length) html += `<div class="pl-empty"><div class="pl-empty-txt">Aucune tâche saisonnière</div></div>`;
    html += `</div></div>`;
    container.innerHTML = html; return;
  }

  // Regular care tab
  html += `<div class="pl-content">
    <div class="pl-care-header"><div class="pl-care-title">${care.icon} ${care.label}</div></div>
    <div class="pl-freq-form">
      <label>Fréquence</label>
      <select id="plFreqSel" onchange="showFreqDays()">
        <option value="">Manuel uniquement</option>
        ${Object.entries(FREQ_LABELS).map(([v,l])=>`<option value="${v}" ${careConf.freq===v?'selected':''}>${l}</option>`).join('')}
      </select>
      <label style="margin-left:6px;">Depuis le</label>
      <input type="date" id="plFreqStart" value="${careConf.startDate||today}" style="border:1px solid var(--line);border-radius:4px;padding:4px 8px;font-size:12px;color:var(--ink-2);background:var(--paper);outline:none;">
      <button class="pl-freq-save" onclick="saveCareFreq('${plant.id}','${plActiveTab}',document.getElementById('plFreqSel').value,document.getElementById('plFreqStart').value)">Enregistrer</button>
      ${careConf.freq?`<span class="pl-freq-info">${FREQ_LABELS[careConf.freq]||''} depuis le ${fmt(careConf.startDate||today)}</span>`:''}
    </div>
    <div class="pl-add-entry">
      <input type="date" id="plManualDate" value="${today}">
      <input type="text" id="plManualNote" placeholder="Note optionnelle…" maxlength="60">
      <button onclick="addManualEntry('${plant.id}','${plActiveTab}',document.getElementById('plManualDate').value,document.getElementById('plManualNote').value);document.getElementById('plManualNote').value=''">+ Ajouter</button>
    </div>`;

  const upcoming = entries.filter(e=>!e.done && e.date>=today).slice(0,10);
  const past     = entries.filter(e=>e.done || e.date<today).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,20);
  const overdue  = entries.filter(e=>!e.done && e.date<today);

  html += `<div class="pl-entries">`;
  if(overdue.length) {
    html += `<div class="pl-section-title" style="color:#dc2626;">⚠️ En retard (${overdue.length})</div>`;
    overdue.forEach(e=>{
      html += `<div class="pl-entry overdue ${e.done?'done':''}">
        <div class="pl-echk" onclick="toggleEntry('${e.id}')">${svgChk}</div>
        <div class="pl-entry-body">
          <div class="pl-entry-label">${e.note||care.label}</div>
          <div class="pl-entry-date">${fmt(e.date)}</div>
        </div>
        <span class="pl-entry-badge overdue">Retard</span>
        <button class="pl-entry-del" onclick="deleteEntry('${e.id}')">✕</button>
      </div>`;
    });
  }
  if(upcoming.length) {
    html += `<div class="pl-section-title">À venir</div>`;
    upcoming.forEach(e=>{
      const isToday = e.date===today;
      html += `<div class="pl-entry upcoming ${e.done?'done':''}">
        <div class="pl-echk" onclick="toggleEntry('${e.id}')">${svgChk}</div>
        <div class="pl-entry-body">
          <div class="pl-entry-label">${e.note||care.label}</div>
          <div class="pl-entry-date">${isToday?"Aujourd'hui":fmt(e.date)}</div>
        </div>
        ${isToday?`<span class="pl-entry-badge">Aujourd'hui</span>`:''}
        <button class="pl-entry-del" onclick="deleteEntry('${e.id}')">✕</button>
      </div>`;
    });
  }
  if(past.length) {
    html += `<div class="pl-section-title">Historique</div>`;
    past.forEach(e=>{
      html += `<div class="pl-entry done">
        <div class="pl-echk" onclick="toggleEntry('${e.id}')">${svgChk}</div>
        <div class="pl-entry-body">
          <div class="pl-entry-label">${e.note||care.label}</div>
          <div class="pl-entry-date">${fmt(e.date)}</div>
        </div>
        <button class="pl-entry-del" onclick="deleteEntry('${e.id}')">✕</button>
      </div>`;
    });
  }
  if(!entries.length) html += `<div class="pl-empty"><div class="pl-empty-txt">Aucun entretien enregistré</div></div>`;
  html += `</div></div>`;
  container.innerHTML = html;
}

function editPlantUrl(plantId) {
  const url = prompt('Coller le lien La Green Touch pour cette plante :');
  if(url === null) return;
  const plants = loadPlants();
  const p = plants.find(x=>x.id===plantId); if(!p) return;
  p.gtUrl = url.trim();
  savePlants(plants);
  renderPlants();
}

function addSeasonalEntry(plantId) {
  const season = document.getElementById('plSeasonSel')?.value;
  const date   = document.getElementById('plSeasonDate')?.value;
  const note   = document.getElementById('plSeasonNote')?.value.trim();
  if(!date || !season) return;
  const entries = loadEntries();
  entries.push({ id:'pe'+Date.now(), plantId, careId:'seasonal', seasonal:season, date, note:note||'', done:false, auto:false });
  saveEntries(entries);
  if(document.getElementById('plSeasonNote')) document.getElementById('plSeasonNote').value='';
  renderPlants();
}

document.getElementById('plNewName')?.addEventListener('keydown', e=>{ if(e.key==='Enter') addPlant(); });
document.getElementById('plMobileName')?.addEventListener('keydown', e=>{ if(e.key==='Enter') addPlantMobile(); });

</script>
</body>
</html>
